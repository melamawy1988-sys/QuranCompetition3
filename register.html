<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التسجيل | مسابقة القرآن الكريم</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="overlay"></div>

<header>

<img src="images/logo.png" class="logo">

<h1>استمارة التسجيل</h1>

<h2>مسابقة القرآن الكريم بالمسجد الكبير بالشوبك</h2>

</header>

<main>

<div class="card">

<form id="registerForm" enctype="multipart/form-data">

<div class="input-group">

<label>الاسم بالكامل</label>

<input type="text" id="name" required>

</div>

<div class="input-group">

<label>العمر</label>

<input type="number" id="age" min="4" max="100" required>

</div>

<div class="input-group">

<label>الرقم القومي</label>

<input
type="text"
id="national"
maxlength="14"
placeholder="14 رقم"
required>

</div>

<div class="input-group">

<label>عدد الأجزاء</label>

<select id="parts" required>

<option value="">اختر</option>

</select>

</div>

<div class="input-group">

<label>شهادة الميلاد</label>

<input

type="file"

id="birth"

accept=".pdf,.jpg,.jpeg,.png"

required>

</div>

<button class="btn" type="submit">

حفظ البيانات

</button>

</form>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/register.js"></script>

</body>

</html>
